<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phillip Papastefanou | Science Hub</title>
    <style>
        /* Reset and Base Styles */
        body, html { 
            margin: 0; 
            padding: 0; 
            font-family: 'Avenir Next', Avenir, 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background: #f1f5f9; /* Soft grey background */
            color: #1e293b; 
        }
        
        /* Top Column / Navigation Bar */
        .top-nav {
            background: white;
            box-shadow: 0 2px 4px rgb(0 0 0 / 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            /* Optional: This keeps the bar at the top even if you scroll down later */
            position: sticky; 
            top: 0;
        }

        /* Your Name on the Left */
        .nav-brand {
            font-size: 1.2rem;
            font-weight: 700;
            color: #d62728; /* The red accent from your other page */
            text-decoration: none;
        }

        /* The Links on the Right */
        .nav-links {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 25px; /* Spacing between links */
        }

        .nav-links li a {
            text-decoration: none;
            color: #475569;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .nav-links li a:hover {
            color: #d62728; /* Turns red when you hover over it */
        }

        /* Main Screen Container */
        .main-content {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            /* Left empty as requested */
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="/" class="nav-brand">Phillip Papastefanou</a>
        
        <ul class="nav-links">
            <li><a href="#">About me</a></li>
            <li><a href="/EcologicalModelling/">Lectures</a></li>
            <li><a href="#">Interactive</a></li>
            <li><a href="#">Projects</a></li>
            <li><a href="#">Publications</a></li>
        </ul>
    </nav>

    <div class="main-content">
        </div>

</body>
</html>
